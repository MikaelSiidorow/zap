name: Promote Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to promote (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Promote to stable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ inputs.tag }}" --prerelease=false --latest
